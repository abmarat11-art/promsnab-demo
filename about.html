<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>О компании — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'about.html', title: t('nav.about') });

    const BRANDS = [
      { emoji:'💧', name:'Grundfos', cat:'pumps',
        ru:'Датский производитель насосного оборудования №1 в мире. Поставляем с 2010 года.',
        uz:'Dunyoda nasos uskunalari №1 ishlab chiqaruvchisi — Daniya. 2010 yildan etkazamiz.' },
      { emoji:'🔧', name:'Atlas Copco', cat:'Atlas+Copco',
        ru:'Шведский бренд компрессоров и промышленного воздуха. Официальный дилер.',
        uz:'Kompressorlar va sanoat havosi bo\'yicha shved brendi. Rasmiy diler.' },
      { emoji:'⚡', name:'Siemens', cat:'Siemens',
        ru:'Немецкое электрооборудование: двигатели, преобразователи, автоматика.',
        uz:'Nemis elektr jihozlari: dvigatellar, konverterlar, avtomatika.' },
      { emoji:'🔌', name:'ABB', cat:'ABB',
        ru:'Швейцарский лидер в электрификации и автоматизации промышленности.',
        uz:'Sanoat elektrifikatsiyasi va avtomatizatsiyasida shveytsariyalik lider.' },
      { emoji:'🌡️', name:'Danfoss', cat:'Danfoss',
        ru:'Датские клапаны, приводы, частотники для ОВиК и промышленности.',
        uz:'OViK va sanoat uchun daniyalik klapanlar, drayverlar, chastotachilar.' },
      { emoji:'🚒', name:'Tyco', cat:'Tyco',
        ru:'Американские системы пожарной безопасности. Авторизованный монтаж.',
        uz:'Amerika yong\'in xavfsizligi tizimlari. Vakolatli montaj.' },
      { emoji:'🛢️', name:'Mobil', cat:'Mobil',
        ru:'Смазочные материалы ExxonMobil для промышленного оборудования.',
        uz:'Sanoat uskunalari uchun ExxonMobil moylash materiallari.' },
      { emoji:'💨', name:'BOGE', cat:'BOGE',
        ru:'Немецкие компрессоры и сжатый воздух для производства.',
        uz:'Ishlab chiqarish uchun nemis kompressorlari va siqilgan havo.' },
    ];

    const TEAM = [
      { emoji:'👨‍💼', name:'Азиз Каримов', nameUz:'Aziz Karimov',
        role:'Генеральный директор', roleUz:'Bosh direktor',
        desc:'Основатель компании, 20+ лет в промышленных поставках',
        descUz:'Kompaniya asoschisi, sanoat ta\'minotida 20+ yil' },
      { emoji:'👩‍🔬', name:'Дилноза Юсупова', nameUz:'Dilnoza Yusupova',
        role:'Главный инженер', roleUz:'Bosh muhandis',
        desc:'Кандидат технических наук, специалист по насосному оборудованию',
        descUz:'Texnika fanlari nomzodi, nasos uskunalari bo\'yicha mutaxassis' },
      { emoji:'👨‍💻', name:'Санжар Рашидов', nameUz:'Sanjor Rashidov',
        role:'Технический директор', roleUz:'Texnik direktor',
        desc:'Эксперт по электрооборудованию и автоматизации',
        descUz:'Elektr jihozlari va avtomatizatsiya bo\'yicha ekspert' },
      { emoji:'👩‍💼', name:'Камола Исмаилова', nameUz:'Kamola Ismoilova',
        role:'Коммерческий директор', roleUz:'Tijorat direktori',
        desc:'Управляет ключевыми клиентами и партнёрствами',
        descUz:'Asosiy mijozlar va hamkorliklarni boshqaradi' },
    ];

    const isUz = currentLang === 'uz';

    document.getElementById('main-content').innerHTML = `
      <div class="page-hero">
        <div class="container">
          <div class="breadcrumb">
            <a onclick="nav('index.html')">${t('nav.home')}</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${t('nav.about')}</span>
          </div>
          <h1 class="page-hero-title">${t('about.title')}</h1>
          <p class="page-hero-sub">${t('about.sub')}</p>
        </div>
      </div>

      <!-- STATS -->
      <section class="section-sm" style="background:var(--bg-2);border-bottom:1px solid var(--border)">
        <div class="container">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center">
            <div><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,var(--primary),#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent">16</div><div style="font-size:13px;color:var(--text-2);margin-top:4px">${t('about.stat1')}</div></div>
            <div><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,var(--primary),#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent">5200+</div><div style="font-size:13px;color:var(--text-2);margin-top:4px">${t('about.stat2')}</div></div>
            <div><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,var(--primary),#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent">3400+</div><div style="font-size:13px;color:var(--text-2);margin-top:4px">${t('about.stat3')}</div></div>
            <div><div style="font-size:40px;font-weight:900;background:linear-gradient(135deg,var(--primary),#7C3AED);-webkit-background-clip:text;-webkit-text-fill-color:transparent">24/7</div><div style="font-size:13px;color:var(--text-2);margin-top:4px">${t('about.stat4')}</div></div>
          </div>
        </div>
      </section>

      <!-- HISTORY -->
      <section class="section">
        <div class="container">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center">
            <div>
              <div class="section-label">${t('about.historyLabel')}</div>
              <h2 class="section-title" style="margin-bottom:20px">${t('about.historyTitle')}</h2>
              <p style="color:var(--text-2);font-size:15px;line-height:1.8;margin-bottom:16px">${t('about.p1')}</p>
              <p style="color:var(--text-2);font-size:15px;line-height:1.8;margin-bottom:16px">${t('about.p2')}</p>
              <p style="color:var(--text-2);font-size:15px;line-height:1.8">${t('about.p3')}</p>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
              <div class="card card-body" style="text-align:center;padding:28px">
                <div style="font-size:36px;margin-bottom:8px">🏭</div>
                <div style="font-weight:700;margin-bottom:4px">${t('about.warehouse')}</div>
                <div style="font-size:13px;color:var(--text-2)">${t('about.warehouseSub')}</div>
              </div>
              <div class="card card-body" style="text-align:center;padding:28px">
                <div style="font-size:36px;margin-bottom:8px">🔧</div>
                <div style="font-weight:700;margin-bottom:4px">${t('about.service')}</div>
                <div style="font-size:13px;color:var(--text-2)">${t('about.serviceSub')}</div>
              </div>
              <div class="card card-body" style="text-align:center;padding:28px">
                <div style="font-size:36px;margin-bottom:8px">👥</div>
                <div style="font-weight:700;margin-bottom:4px">${t('about.staff')}</div>
                <div style="font-size:13px;color:var(--text-2)">${t('about.staffSub')}</div>
              </div>
              <div class="card card-body" style="text-align:center;padding:28px">
                <div style="font-size:36px;margin-bottom:8px">🌍</div>
                <div style="font-weight:700;margin-bottom:4px">${t('about.regions')}</div>
                <div style="font-size:13px;color:var(--text-2)">${t('about.regionsSub')}</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- BRANDS -->
      <section class="section" id="brands" style="background:var(--bg-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
        <div class="container">
          <div class="section-header" style="text-align:center">
            <div class="section-label">${t('about.brandsLabel')}</div>
            <h2 class="section-title">${t('about.brandsTitle')}</h2>
            <p class="section-sub">${t('about.brandsSub')}</p>
          </div>
          <div class="grid-4">
            ${BRANDS.map(b => `<div class="card card-body">
              <div style="font-size:32px;margin-bottom:10px">${b.emoji}</div>
              <div style="font-size:16px;font-weight:700;margin-bottom:8px">${b.name}</div>
              <div style="font-size:13px;color:var(--text-2);line-height:1.6">${isUz ? b.uz : b.ru}</div>
              <button class="btn btn-ghost btn-sm" style="margin-top:12px;padding-left:0" onclick="nav('catalog.html?brand=${b.cat}')">${t('about.seeProducts')}</button>
            </div>`).join('')}
          </div>
        </div>
      </section>

      <!-- TEAM -->
      <section class="section">
        <div class="container">
          <div class="section-header" style="text-align:center">
            <div class="section-label">${t('about.teamLabel')}</div>
            <h2 class="section-title">${t('about.teamTitle')}</h2>
          </div>
          <div class="grid-4">
            ${TEAM.map(m => `<div class="card card-body" style="text-align:center">
              <div style="font-size:48px;margin-bottom:12px">${m.emoji}</div>
              <div style="font-weight:700;margin-bottom:4px;word-break:break-word">${isUz ? m.nameUz : m.name}</div>
              <div style="font-size:12px;color:var(--primary);font-weight:600;margin-bottom:8px;word-break:break-word">${isUz ? m.roleUz : m.role}</div>
              <div style="font-size:13px;color:var(--text-2);line-height:1.5;word-break:break-word">${isUz ? m.descUz : m.desc}</div>
            </div>`).join('')}
          </div>
        </div>
      </section>

      <!-- CTA -->
      <section class="section-sm">
        <div class="container" style="text-align:center">
          <h2 style="font-size:28px;font-weight:800;margin-bottom:12px">${t('about.ctaTitle')}</h2>
          <p style="color:var(--text-2);margin-bottom:24px">${t('about.ctaSub')}</p>
          <div style="display:flex;gap:12px;justify-content:center">
            <button class="btn btn-primary btn-lg" onclick="nav('contacts.html')">${t('about.ctaContact')}</button>
            <button class="btn btn-outline btn-lg" onclick="nav('catalog.html')">${t('about.ctaCatalog')}</button>
          </div>
        </div>
      </section>
    `;
  </script>
</body>
</html>

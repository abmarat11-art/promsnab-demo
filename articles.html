<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Статьи — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .article-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .article-card {
      background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-lg);
      overflow: hidden; cursor: pointer; transition: all var(--t); display: flex; flex-direction: column;
    }
    .article-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
    .article-img {
      height: 160px; background: var(--bg-3); display: flex; align-items: center;
      justify-content: center; font-size: 64px; border-bottom: 1px solid var(--border);
    }
    .article-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .article-tag { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: .08em; }
    .article-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
    .article-excerpt { font-size: 13px; color: var(--text-2); line-height: 1.65; flex: 1; }
    .article-meta { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-3); padding-top: 12px; border-top: 1px solid var(--border); }
    .article-modal-body { max-height: 60vh; overflow-y: auto; }
    .article-modal-body p { margin-bottom: 14px; font-size: 14px; color: var(--text-2); line-height: 1.8; }
    .article-modal-body h3 { font-size: 16px; font-weight: 700; margin: 20px 0 8px; }
  </style>
</head>
<body>
  <main id="main-content"></main>

  <div class="modal-overlay" id="article-modal" onclick="if(event.target===this)closeArticle()">
    <div class="modal-box" style="max-width:680px">
      <div class="modal-header">
        <div class="modal-title" id="article-modal-title"></div>
        <button class="modal-close icon-btn" onclick="closeArticle()">✕</button>
      </div>
      <div class="modal-body article-modal-body" id="article-modal-body"></div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'articles.html', title: t('nav.articles') });

    const isUz = currentLang === 'uz';

    const ARTICLES = isUz ? [
      {
        emoji: '💧', tag: 'Nasoslar', date: '15 iyun 2026', views: 1240,
        title: 'Suv ta\'minoti tizimi uchun markazdan qochma nasos qanday tanlanadi',
        excerpt: 'Asosiy parametrlar: unumdorlik, bosim, zichlash turi. PromSnab muhandislaridan amaliy maslahatlar.',
        content: `<h3>Tanlashning asosiy parametrlari</h3><p>Markazdan qochma nasos tanlashda uchta asosiy parametrni hisobga olish kerak: unumdorlik (m³/soat), bosim (suv ustuni metrlari) va quyiladigan muhit turi.</p><h3>Unumdorlik</h3><p>Unumdorlik tizimning ehtiyojlari bilan aniqlanadi. Turar-joy uchun: 4 kishilik oilaga 1.5–3 m³/soat. Sanoat ehtiyojlari uchun texnologik jarayon asosida hisoblanadi.</p><h3>Bosim</h3><p>Bosim quvur tizimining qarshiligi va ko'tarilish balandligini yengishi kerak. Formula: H = Hz + Hf, bu yerda Hz — geometrik balandlik, Hf — ishqalanish yo'qotishlari.</p><p>Parametrlaringiz bo'yicha uskunani aniq tanlash uchun PromSnab muhandislariga murojaat qiling.</p>`
      },
      {
        emoji: '🔧', tag: 'Kompressorlar', date: '3 iyun 2026', views: 876,
        title: 'Atlas Copco vintli kompressorlar: texnik xizmat ko\'rsatish',
        excerpt: 'Yog\', filtrlar va sarflanadigan materiallarni almashtirish muddatlari. Nimani o\'zingiz qilish mumkin, nimaga servis kerak.',
        content: `<h3>Reglament TO</h3><p>Birinchi TO 500 soat ishlagandan keyin, keyin har 2000 soatda yoki yiliga bir marta o'tkaziladi. TO doirasida moyli, havo va moy separatori almashtiriladi.</p><h3>Yog'ni almashtirish</h3><p>Faqat original Roto-Inject Fluid moyidan foydalaning. 4000 soat yoki 2 yildan keyin almashtiring. Talablar bajarilmasa kafolat bekor bo'ladi.</p><h3>Nimani o'zingiz qilish mumkin</h3><p>Har kuni yog' sathini tekshirish, vizual ko'rik, havo filtrini purkalash — korxona xodimlari tomonidan amalga oshiriladi. Sarflanadigan materiallarni almashtirish va servis — faqat vakolatli markaz tomonidan.</p>`
      },
      {
        emoji: '⚡', tag: 'Elektr jihozlar', date: '22 may 2026', views: 654,
        title: 'Chastota konvertorlari: elektr energiyasini 40% gacha tejash',
        excerpt: 'Nasos va ventilyatorlarga VFD o\'rnatish 12–18 oyda o\'zini qoplashi va energiya sarfini kamaytirishi.',
        content: `<h3>Ishlash printsipi</h3><p>Chastota konvertori (VFD) dvigatel tezligini yuklamaga qarab tartibga soladi. Tezlik 20% kamaytirilganda energiya sarfi 49% ga tushadi (kub bog'liqlik qonuni).</p><h3>Tipik o'zini qoplash muddati</h3><p>22 kVt quvvatli nasos qurilmasida, o'rtacha kunlik yuklanish 70%: tejash yiliga ~35 000 kVt·soat, ya'ni taxminan 5.6 mln so'm. ABB 22 kVt VFD narxi — 185 000 so'm. O'zini qoplash muddati — 12 oy.</p>`
      },
      {
        emoji: '🔩', tag: 'Armatura', date: '10 may 2026', views: 432,
        title: 'Zaglushkalar va sharli kranlar: quvur uchun nimani tanlash?',
        excerpt: 'Bosim, harorat, ochish chastotasi va egalik narxi bo\'yicha to\'suvchi armatura turlarini solishtiramiz.',
        content: `<h3>Zaglushkalar</h3><p>Kamdan-kam ulanishlarda (sutkada 2 martadan kam), yuqori bosimda (PN10–PN100) va katta diametrlar DN150–DN1000 da qo'llaniladi. Asosiy afzalligi — ochiq holatda minimal gidravlik qarshilik.</p><h3>Sharli kranlar</h3><p>Tez-tez ulanishlar, kichik va o'rta diametrlar DN15–DN150 uchun optimal. Tezkor yopish (90°), ixchamlik, A sinf germetikligi. Kamchiligi — tez yopishda gidrodarba.</p>`
      },
      {
        emoji: '🛢️', tag: 'Moylash', date: '28 aprel 2026', views: 318,
        title: 'Podshipniklar uchun plastik moyni to\'g\'ri tanlash',
        excerpt: 'NLGI sinflari, harorat diapazonlari, quyuqlashtiruvchilar muvofiqligi. Erta eskirishga olib keladigan xatolar.',
        content: `<h3>NLGI sinflari</h3><p>NLGI 0–1: markazlashtirilgan yetkazib berish tizimlari uchun suyuq moylar. NLGI 2: aksariyat podshipniklar uchun universal sinf. NLGI 3: vertikal podshipniklar va tebranishli tugunlar uchun quyuq moylar.</p><h3>Quyuqlashtiruvchilar muvofiqligi</h3><p>Litiy va kaltsiy moylarini aralashtirish mumkin emas — moy xususiyatisiz suyuq massa hosil bo'ladi. Moy turini o'zgartirishda podshipnikni to'liq yuvish kerak.</p>`
      },
      {
        emoji: '⚙️', tag: 'Dastgohlar', date: '15 aprel 2026', views: 285,
        title: '16K20 tokarlik dastgohi: sozlash va foydalanish',
        excerpt: 'Markazlarni o\'rnatish, kesish rejimlarini tanlash va yo\'naltiruvchilarni parvarishlash bo\'yicha bosqichma-bosqich qo\'llanma.',
        content: `<h3>Markazlarni sozlash</h3><p>Old va orqa markazlar o'qlari mosligini indikator bilan tekshiriladi. Ruxsat — 300 mm uzunlikda 0.01 mm dan ko'p emas. Sozlash — orqa boshning pinolini siljitish orqali.</p><h3>Kesish rejimlarini tanlash</h3><p>45-po'lat uchun: kesish tezligi 80–120 m/min, surish 0.1–0.3 mm/rev, qo'pol ishlovda chuqurlik 1–3 mm. Asbob chidamliligini oshirish uchun SOZh dan foydalaning.</p>`
      },
    ] : [
      {
        emoji: '💧', tag: 'Насосы', date: '15 июня 2026', views: 1240,
        title: 'Как выбрать центробежный насос для системы водоснабжения',
        excerpt: 'Разбираем ключевые параметры: производительность, напор, тип уплотнения. Практические советы по подбору от инженеров PromSnab.',
        content: `<h3>Основные параметры выбора</h3><p>При выборе центробежного насоса необходимо учитывать три ключевых параметра: производительность (м³/ч), напор (метры водяного столба) и тип перекачиваемой среды.</p><h3>Производительность</h3><p>Производительность определяется потребностями системы. Для жилых домов: 1.5–3 м³/ч на семью из 4 человек. Для промышленных нужд расчёт ведётся исходя из технологического процесса.</p><h3>Напор</h3><p>Напор должен преодолевать сопротивление трубопровода и высоту подъёма. Формула: H = Hz + Hf, где Hz — геометрическая высота, Hf — потери на трение.</p><p>Рекомендуем обратиться к инженерам PromSnab для точного подбора оборудования по вашим параметрам.</p>`
      },
      {
        emoji: '🔧', tag: 'Компрессоры', date: '3 июня 2026', views: 876,
        title: 'Винтовые компрессоры Atlas Copco: техническое обслуживание',
        excerpt: 'Периодичность замены масла, фильтров и расходников. Что можно сделать самостоятельно, а что требует сервисного инженера.',
        content: `<h3>Регламентное ТО</h3><p>Первое ТО проводится через 500 часов работы, далее — каждые 2000 часов или раз в год. В рамках ТО меняются масляный, воздушный и масляный сепаратор.</p><h3>Замена масла</h3><p>Используйте только оригинальное масло Roto-Inject Fluid. Замена через 4000 часов или 2 года. Несоблюдение требований ведёт к потере гарантии.</p><h3>Что можно делать самому</h3><p>Ежедневная проверка уровня масла, визуальный осмотр, продувка воздушного фильтра — это выполняется персоналом предприятия. Замена расходников и сервис — только авторизованным центром.</p>`
      },
      {
        emoji: '⚡', tag: 'Электрооборудование', date: '22 мая 2026', views: 654,
        title: 'Частотные преобразователи: экономия электроэнергии до 40%',
        excerpt: 'Как установка VFD на насосы и вентиляторы окупается за 12–18 месяцев и снижает энергопотребление.',
        content: `<h3>Принцип работы</h3><p>Частотный преобразователь (VFD) регулирует скорость двигателя в зависимости от нагрузки. При снижении скорости на 20% потребление энергии падает на 49% (закон кубической зависимости).</p><h3>Типичная окупаемость</h3><p>На насосной установке мощностью 22 кВт при среднесуточной загрузке 70%: экономия ~35 000 кВт·ч в год, или около 5,6 млн сум. Стоимость VFD ABB 22 кВт — 185 000 сум. Окупаемость — 12 месяцев.</p>`
      },
      {
        emoji: '🔩', tag: 'Арматура', date: '10 мая 2026', views: 432,
        title: 'Задвижки vs шаровые краны: что выбрать для трубопровода?',
        excerpt: 'Сравниваем типы запорной арматуры по давлению, температуре, частоте открытия и стоимости владения.',
        content: `<h3>Задвижки</h3><p>Применяются в системах с редкими переключениями (менее 2 раз в сутки), высоким давлением (PN10–PN100) и большими диаметрами DN150–DN1000. Основное преимущество — минимальное гидравлическое сопротивление в открытом состоянии.</p><h3>Шаровые краны</h3><p>Оптимальны для частых переключений, малых и средних диаметров DN15–DN150. Быстрое закрытие (90°), компактность, герметичность класса А. Недостаток — гидроудар при быстром закрытии.</p>`
      },
      {
        emoji: '🛢️', tag: 'Смазочные', date: '28 апреля 2026', views: 318,
        title: 'Правильный выбор пластичной смазки для подшипников',
        excerpt: 'Классы NLGI, температурные диапазоны, совместимость загустителей. Ошибки, которые приводят к преждевременному износу.',
        content: `<h3>Классы NLGI</h3><p>NLGI 0–1: жидкие смазки для систем централизованной подачи. NLGI 2: универсальный класс для большинства подшипников. NLGI 3: густые смазки для вертикальных подшипников и вибронагруженных узлов.</p><h3>Совместимость загустителей</h3><p>Нельзя смешивать литиевые и кальциевые смазки — образуется жидкая масса без смазочных свойств. При смене типа смазки — полная промывка подшипника.</p>`
      },
      {
        emoji: '⚙️', tag: 'Станки', date: '15 апреля 2026', views: 285,
        title: 'Токарный станок 16К20: настройка и эксплуатация',
        excerpt: 'Пошаговое руководство по выставлению центров, выбору режимов резания и уходу за направляющими.',
        content: `<h3>Настройка центров</h3><p>Совпадение осей переднего и заднего центров проверяется индикатором. Допуск — не более 0.01 мм на длине 300 мм. Регулировка — смещением пиноли задней бабки.</p><h3>Выбор режимов резания</h3><p>Для стали 45: скорость резания 80–120 м/мин, подача 0.1–0.3 мм/об, глубина 1–3 мм при черновой обработке. Используйте СОЖ для увеличения стойкости инструмента.</p>`
      },
    ];

    document.getElementById('main-content').innerHTML = `
      <section class="section" style="padding-top:40px">
        <div class="container">
          <div class="section-header">
            <div class="section-label">${isUz ? 'Foydali materiallar' : 'Полезные материалы'}</div>
            <h1 class="section-title">${isUz ? 'Maqolalar va qo\'llanmalar' : 'Статьи и руководства'}</h1>
          </div>
          <div class="article-grid" id="articles-grid"></div>
        </div>
      </section>
    `;

    function openArticle(i) {
      const a = ARTICLES[i];
      document.getElementById('article-modal-title').textContent = a.title;
      document.getElementById('article-modal-body').innerHTML = a.content;
      document.getElementById('article-modal').classList.add('open');
    }
    function closeArticle() { document.getElementById('article-modal').classList.remove('open'); }

    document.getElementById('articles-grid').innerHTML = ARTICLES.map((a, i) => `
      <div class="article-card" onclick="openArticle(${i})">
        <div class="article-img">${a.emoji}</div>
        <div class="article-body">
          <div class="article-tag">${a.tag}</div>
          <div class="article-title">${a.title}</div>
          <div class="article-excerpt">${a.excerpt}</div>
          <div class="article-meta">
            <span>${a.date}</span>
            <span>👁 ${a.views.toLocaleString('ru-RU')}</span>
          </div>
        </div>
      </div>`).join('');
  </script>
</body>
</html>

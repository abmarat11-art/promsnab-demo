<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакты — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'contacts.html', title: t('nav.contacts') });

    document.getElementById('main-content').innerHTML = `
      <div class="page-hero">
        <div class="container">
          <div class="breadcrumb">
            <a onclick="nav('index.html')">${t('nav.home')}</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${t('nav.contacts')}</span>
          </div>
          <h1 class="page-hero-title">${t('contacts.title')}</h1>
          <p class="page-hero-sub">${t('contacts.sub')}</p>
        </div>
      </div>

      <section class="section">
        <div class="container">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:48px">

            <!-- CONTACT INFO -->
            <div>
              <h2 style="font-size:24px;font-weight:800;margin-bottom:24px">${t('contacts.ourContacts')}</h2>
              <div style="display:flex;flex-direction:column;gap:16px;margin-bottom:32px">
                <div class="card card-body flex gap-4">
                  <div style="font-size:28px">📍</div>
                  <div>
                    <div style="font-weight:600;margin-bottom:4px">${t('contacts.address')}</div>
                    <div style="font-size:14px;color:var(--text-2)">${t('contacts.addressVal')}</div>
                  </div>
                </div>
                <div class="card card-body flex gap-4" style="cursor:pointer" onclick="window.location='tel:+998712345678'">
                  <div style="font-size:28px">📞</div>
                  <div>
                    <div style="font-weight:600;margin-bottom:4px">${t('contacts.phone')}</div>
                    <div style="font-size:14px;color:var(--primary)">+998 71 234-56-78</div>
                    <div style="font-size:12px;color:var(--text-2)">${t('contacts.phoneSchedule')}</div>
                  </div>
                </div>
                <div class="card card-body flex gap-4" style="cursor:pointer" onclick="window.location='tel:+998901234567'">
                  <div style="font-size:28px">📱</div>
                  <div>
                    <div style="font-weight:600;margin-bottom:4px">${t('contacts.messenger')}</div>
                    <div style="font-size:14px;color:var(--primary)">+998 90 123-45-67</div>
                    <div style="font-size:12px;color:var(--text-2)">${t('contacts.messengerSchedule')}</div>
                  </div>
                </div>
                <div class="card card-body flex gap-4" style="cursor:pointer" onclick="window.location='mailto:info@promsnab.uz'">
                  <div style="font-size:28px">✉️</div>
                  <div>
                    <div style="font-weight:600;margin-bottom:4px">${t('contacts.email')}</div>
                    <div style="font-size:14px;color:var(--primary)">info@promsnab.uz</div>
                    <div style="font-size:12px;color:var(--text-2)">${t('contacts.emailReply')}</div>
                  </div>
                </div>
              </div>

              <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-lg);height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer" onclick="toast('info','${t('contacts.openMap')}')">
                <div style="font-size:48px">🗺️</div>
                <div style="font-size:14px;color:var(--text-2)">${t('contacts.addressVal').split(',')[0]}</div>
                <button class="btn btn-outline btn-sm">${t('contacts.openMap')}</button>
              </div>

              <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
                <div class="card card-body" style="text-align:center">
                  <div style="font-size:24px;margin-bottom:6px">⏰</div>
                  <div style="font-size:13px;font-weight:600;margin-bottom:4px">${t('contacts.office')}</div>
                  <div style="font-size:12px;color:var(--text-2);white-space:pre-line">${t('contacts.officeHours')}</div>
                </div>
                <div class="card card-body" style="text-align:center">
                  <div style="font-size:24px;margin-bottom:6px">🏭</div>
                  <div style="font-size:13px;font-weight:600;margin-bottom:4px">${t('contacts.warehouse')}</div>
                  <div style="font-size:12px;color:var(--text-2);white-space:pre-line">${t('contacts.warehouseHours')}</div>
                </div>
              </div>
            </div>

            <!-- FORM -->
            <div>
              <h2 style="font-size:24px;font-weight:800;margin-bottom:8px">${t('contacts.formTitle')}</h2>
              <p style="font-size:14px;color:var(--text-2);margin-bottom:24px">${t('contacts.formSub')}</p>
              <form onsubmit="submitContact(event)" style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px">
                <div class="grid-2">
                  <div class="form-group">
                    <label class="form-label">${t('contacts.name')}</label>
                    <input class="form-control" required placeholder="${t('ph.name')}">
                  </div>
                  <div class="form-group">
                    <label class="form-label">${t('contacts.phone2')}</label>
                    <input class="form-control" required placeholder="+998 XX XXX-XX-XX">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">${t('contacts.email2')}</label>
                  <input class="form-control" type="email" placeholder="email@company.uz">
                </div>
                <div class="form-group">
                  <label class="form-label">${t('contacts.company')}</label>
                  <input class="form-control" placeholder="${t('ph.company')}">
                </div>
                <div class="form-group">
                  <label class="form-label">${t('contacts.subject')}</label>
                  <select class="form-control">
                    <option>${t('contacts.subj1')}</option>
                    <option>${t('contacts.subj2')}</option>
                    <option>${t('contacts.subj3')}</option>
                    <option>${t('contacts.subj4')}</option>
                    <option>${t('contacts.subj5')}</option>
                    <option>${t('contacts.subj6')}</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">${t('contacts.message')}</label>
                  <textarea class="form-control" required placeholder="${t('contacts.messagePh')}" style="min-height:120px"></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label">${t('contacts.file')}</label>
                  <input class="form-control" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx">
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-full">${t('contacts.submit')}</button>
                <p style="font-size:11px;color:var(--text-3);margin-top:12px;text-align:center">${t('contacts.privacy')}</p>
              </form>
            </div>
          </div>
        </div>
      </section>

      <!-- MANAGERS -->
      <section class="section-sm" style="background:var(--bg-2);border-top:1px solid var(--border)">
        <div class="container">
          <div class="section-header" style="text-align:center">
            <div class="section-label">${t('contacts.managersLabel')}</div>
            <h2 class="section-title">${t('contacts.managersTitle')}</h2>
          </div>
          <div class="grid-3" id="managers-grid"></div>
        </div>
      </section>
    `;

    const managers = currentLang === 'uz' ? [
      ['👨‍💼','Bobur Turdiyev','b.turdiyev@promsnab.uz','+998 90 111-22-33','Nasoslar, kompressorlar'],
      ['👩‍💼','Nilufar Eshmatova','n.eshmatova@promsnab.uz','+998 90 222-33-44','Armatura, quvurlar'],
      ['👨‍💻','Alisher Nazarov','a.nazarov@promsnab.uz','+998 90 333-44-55','Elektr jihozlar, avtomatika'],
    ] : [
      ['👨‍💼','Бобур Турдиев','b.turdiyev@promsnab.uz','+998 90 111-22-33','Насосы, компрессоры'],
      ['👩‍💼','Нилуфар Эшматова','n.eshmatova@promsnab.uz','+998 90 222-33-44','Арматура, трубопроводы'],
      ['👨‍💻','Алишер Назаров','a.nazarov@promsnab.uz','+998 90 333-44-55','Электрооборудование, автоматика'],
    ];

    document.getElementById('managers-grid').innerHTML = managers.map(([em,name,email,tel,spec]) =>
      `<div class="card card-body" style="display:flex;gap:16px;align-items:flex-start">
        <div style="font-size:40px;flex-shrink:0">${em}</div>
        <div style="min-width:0;flex:1">
          <div style="font-weight:700;margin-bottom:2px;word-break:break-word">${name}</div>
          <div style="font-size:11px;color:var(--primary);font-weight:600;margin-bottom:6px;word-break:break-word">${spec}</div>
          <a href="tel:${tel.replace(/[^+\d]/g,'')}" style="display:block;font-size:13px;color:var(--text-2);margin-bottom:2px;word-break:break-word">${tel}</a>
          <a href="mailto:${email}" style="font-size:13px;color:var(--text-2);word-break:break-word">${email}</a>
        </div>
      </div>`
    ).join('');

    function submitContact(e) {
      e.preventDefault();
      e.target.reset();
      toast('success', t('contacts.sent'));
    }
  </script>
</body>
</html>

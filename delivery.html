<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата и доставка — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .info-section { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px 36px; margin-bottom: 24px; }
    .info-section h2 { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .info-row { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .info-row:last-child { border-bottom: none; }
    .info-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--primary-g); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .info-key { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .info-val { font-size: 13px; color: var(--text-2); line-height: 1.6; }
    .delivery-zone { background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
    .delivery-zone-city { font-weight: 700; font-size: 15px; }
    .delivery-zone-time { font-size: 13px; color: var(--text-2); }
    .delivery-zone-price { font-size: 15px; font-weight: 800; color: var(--primary); margin-left: auto; }
  </style>
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'delivery.html', title: t('footer.delivery') });

    const isUz = currentLang === 'uz';

    const D = {
      label:       isUz ? 'Ish shartlari'                        : 'Условия работы',
      title:       isUz ? 'To\'lov va yetkazib berish'           : 'Оплата и доставка',
      // Delivery
      delivTitle:  isUz ? '🚚 Yetkazib berish'                   : '🚚 Доставка',
      city1:       isUz ? 'Toshkent bo\'ylab'                    : 'По Ташкенту',
      city1val:    isUz ? 'O\'z kuryer xizmati. Soat 14:00 gacha buyurtma berganda shu kuni yetkazib beramiz. Narxi 20 000 so\'mdan (500 000 so\'mdan buyurtmalarda bepul).' : 'Собственная курьерская служба. Доставка в день заказа при оформлении до 14:00. Стоимость от 20 000 сум (бесплатно при заказе от 500 000 сум).',
      city2:       isUz ? 'O\'zbekiston bo\'ylab'                : 'По Узбекистану',
      city2val:    isUz ? 'Transport kompaniyalari orqali yetkazib berish: Uzpost Express, Yurt-Ichi Express, DHL. Muddati mintaqaga qarab 2–5 ish kuni. Narxi og\'irlik va o\'lchamga qarab hisoblanadi.' : 'Доставка транспортными компаниями: Uzpost Express, Yurt-Ichi Express, DHL. Срок 2–5 рабочих дней в зависимости от региона. Стоимость рассчитывается по весу и габаритам.',
      city3:       isUz ? 'Ombordan olib ketish'                 : 'Самовывоз со склада',
      city3val:    isUz ? 'Bepul. Manzil: Toshkent sh., Katartal ko\'ch. 67. Berish vaqti: Du–Ju 9:00–17:30, Sh 9:00–13:00. To\'lovdan keyin 2 soat ichida tayyor.' : 'Бесплатно. Адрес: г. Ташкент, ул. Катартал 67. Часы выдачи: Пн–Пт 9:00–17:30, Сб 9:00–13:00. Заказ готов к выдаче в течение 2 часов после оплаты.',
      city4:       isUz ? 'Yirik hajmli uskunalar'               : 'Крупногабаритное оборудование',
      city4val:    isUz ? 'Nasos stantsiyalari, kompressorlar, dastgohlar — maxsus transport bilan, kran bilan tushirish imkoniyati bilan yetkazib berish. Muddatlar va narxlar individual kelishiladi.' : 'Насосные станции, компрессоры, станки — доставка специализированным транспортом с возможностью разгрузки кран-балкой. Сроки и стоимость согласовываются индивидуально.',
      // Zones
      zone1city:  isUz ? 'Toshkent'               : 'Ташкент',
      zone1time:  isUz ? 'Buyurtma kuni'           : 'В день заказа',
      zone1price: isUz ? '20 000 so\'mdan'         : 'от 20 000 сум',
      zone2city:  isUz ? 'Samarqand, Buxoro'       : 'Самарканд, Бухара',
      zone2time:  isUz ? '2–3 kun'                 : '2–3 дня',
      zone2price: isUz ? '45 000 so\'mdan'         : 'от 45 000 сум',
      zone3city:  isUz ? 'Farg\'ona, Andijon'      : 'Фергана, Андижан',
      zone3time:  isUz ? '2–3 kun'                 : '2–3 дня',
      zone3price: isUz ? '50 000 so\'mdan'         : 'от 50 000 сум',
      zone4city:  isUz ? 'Nukus, Navoiy'           : 'Нукус, Навои',
      zone4time:  isUz ? '3–5 kun'                 : '3–5 дней',
      zone4price: isUz ? '65 000 so\'mdan'         : 'от 65 000 сум',
      // Payment
      payTitle:   isUz ? '💳 To\'lov'              : '💳 Оплата',
      pay1:       isUz ? 'Naqd pul'                : 'Наличными',
      pay1val:    isUz ? 'O\'z ombori yoki kuryerga berishda. Milliy valutada (so\'m) to\'lov.' : 'При самовывозе или доставке курьером. Оплата в национальной валюте (сум).',
      pay2:       isUz ? 'Bank kartasi'            : 'Банковской картой',
      pay2val:    isUz ? 'Uzcard, Humo, Visa, Mastercard. Onlayn yoki POS-terminal orqali.' : 'Uzcard, Humo, Visa, Mastercard. Оплата онлайн или через POS-терминал при получении.',
      pay3:       isUz ? 'Naqdsiz hisob-kitob (yuridik shaxslar uchun)' : 'Безналичный расчёт (юридическим лицам)',
      pay3val:    isUz ? 'Hisob-faktura bo\'yicha. INN bilan ishlaymiz, E-IMZO qabul qilamiz. Shartnoma bo\'yicha to\'lov muddati. Hisob-fakturada QQS ajratilgan.' : 'По выставленному счёту. Работаем с ИНН, принимаем E-IMZO. Срок оплаты по договору. НДС выделяется в счёт-фактуре.',
      pay4:       isUz ? 'Bo\'lib to\'lash va muddatni kechiktirish' : 'Рассрочка и отсрочка',
      pay4val:    isUz ? 'Doimiy mijozlar uchun (6 oydan ko\'proq hamkorlik) 30 kungacha to\'lov muhlati. Shartlar menejer bilan kelishiladi.' : 'Для постоянных клиентов (от 6 месяцев сотрудничества) возможна отсрочка платежа до 30 дней. Условия согласовываются с менеджером.',
      // Returns
      retTitle:   isUz ? '↩️ Qaytarish va almashtirish'  : '↩️ Возврат и обмен',
      ret1:       isUz ? 'Qaytarish shartlari'             : 'Условия возврата',
      ret1val:    isUz ? 'Tegishli sifatdagi mahsulotni qadoqlash va tovar ko\'rinishi saqlanib 14 kun ichida qaytarish mumkin. Ishlatilgan mahsulot qabul qilinmaydi.' : 'Возврат товара надлежащего качества в течение 14 дней с сохранением упаковки и товарного вида. Товар, бывший в употреблении, не принимается.',
      ret2:       isUz ? 'Kafolat bo\'yicha qaytarish'     : 'Гарантийный возврат',
      ret2val:    isUz ? 'Ishlab chiqarish nuqsoni aniqlanganda: 5 ish kuni ichida almashtirish yoki pulni qaytarish. Kafolat ta\'miri servis markazimiz orqali.' : 'При обнаружении производственного дефекта: замена в течение 5 рабочих дней или возврат средств. Гарантийный ремонт через наш сервисный центр.',
      // Bottom
      qSub:      isUz ? 'Yetkazib berish yoki to\'lov bo\'yicha savollaringiz bormi?' : 'Остались вопросы по доставке или оплате?',
      callBtn:   isUz ? '📞 Qayta qo\'ng\'iroq'          : '📞 Обратный звонок',
      writeBtn:  isUz ? 'Bizga yozing'                    : 'Написать нам',
    };

    document.getElementById('main-content').innerHTML = `
      <section class="section" style="padding-top:40px">
        <div class="container" style="max-width:820px">
          <div class="section-header">
            <div class="section-label">${D.label}</div>
            <h1 class="section-title">${D.title}</h1>
          </div>

          <div class="info-section">
            <h2>${D.delivTitle}</h2>
            <div class="info-row"><div class="info-icon">🏙️</div><div><div class="info-key">${D.city1}</div><div class="info-val">${D.city1val}</div></div></div>
            <div class="info-row"><div class="info-icon">🗺️</div><div><div class="info-key">${D.city2}</div><div class="info-val">${D.city2val}</div></div></div>
            <div class="info-row"><div class="info-icon">🏭</div><div><div class="info-key">${D.city3}</div><div class="info-val">${D.city3val}</div></div></div>
            <div class="info-row"><div class="info-icon">⚙️</div><div><div class="info-key">${D.city4}</div><div class="info-val">${D.city4val}</div></div></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px">
              <div class="delivery-zone"><div><div class="delivery-zone-city">${D.zone1city}</div><div class="delivery-zone-time">${D.zone1time}</div></div><div class="delivery-zone-price">${D.zone1price}</div></div>
              <div class="delivery-zone"><div><div class="delivery-zone-city">${D.zone2city}</div><div class="delivery-zone-time">${D.zone2time}</div></div><div class="delivery-zone-price">${D.zone2price}</div></div>
              <div class="delivery-zone"><div><div class="delivery-zone-city">${D.zone3city}</div><div class="delivery-zone-time">${D.zone3time}</div></div><div class="delivery-zone-price">${D.zone3price}</div></div>
              <div class="delivery-zone"><div><div class="delivery-zone-city">${D.zone4city}</div><div class="delivery-zone-time">${D.zone4time}</div></div><div class="delivery-zone-price">${D.zone4price}</div></div>
            </div>
          </div>

          <div class="info-section">
            <h2>${D.payTitle}</h2>
            <div class="info-row"><div class="info-icon">💵</div><div><div class="info-key">${D.pay1}</div><div class="info-val">${D.pay1val}</div></div></div>
            <div class="info-row"><div class="info-icon">💳</div><div><div class="info-key">${D.pay2}</div><div class="info-val">${D.pay2val}</div></div></div>
            <div class="info-row"><div class="info-icon">🏦</div><div><div class="info-key">${D.pay3}</div><div class="info-val">${D.pay3val}</div></div></div>
            <div class="info-row"><div class="info-icon">📅</div><div><div class="info-key">${D.pay4}</div><div class="info-val">${D.pay4val}</div></div></div>
          </div>

          <div class="info-section">
            <h2>${D.retTitle}</h2>
            <div class="info-row"><div class="info-icon">✅</div><div><div class="info-key">${D.ret1}</div><div class="info-val">${D.ret1val}</div></div></div>
            <div class="info-row"><div class="info-icon">🛡️</div><div><div class="info-key">${D.ret2}</div><div class="info-val">${D.ret2val}</div></div></div>
          </div>

          <div style="text-align:center;padding:20px">
            <p style="color:var(--text-2);margin-bottom:16px">${D.qSub}</p>
            <div style="display:flex;gap:12px;justify-content:center">
              <button class="btn btn-primary" onclick="openCallback()">${D.callBtn}</button>
              <button class="btn btn-outline" onclick="nav('contacts.html')">${D.writeBtn}</button>
            </div>
          </div>
        </div>
      </section>
    `;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Документы — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .doc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .doc-card {
      background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 22px; display: flex; align-items: flex-start; gap: 16px; cursor: pointer;
      transition: all var(--t);
    }
    .doc-card:hover { border-color: var(--primary); background: var(--primary-g); }
    .doc-icon { font-size: 32px; flex-shrink: 0; line-height: 1; }
    .doc-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .doc-meta { font-size: 12px; color: var(--text-3); }
    .doc-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    .doc-tag.pdf  { background: rgba(239,68,68,.12); color: #F87171; }
    .doc-tag.cert { background: rgba(34,197,94,.12); color: #4ADE80; }
    .doc-tag.doc  { background: rgba(99,102,241,.12); color: #A5B4FC; }
    .doc-section-title { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .09em; color: var(--text-3); margin: 28px 0 14px; }
  </style>
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'documents.html', title: t('footer.docs') });

    const isUz = currentLang === 'uz';
    const dc = (tag, icon, label, name, meta) =>
      `<div class="doc-card" onclick="toast('info','${isUz ? 'Hujjat yuklanmoqda...' : 'Загрузка документа...'}')">
        <div class="doc-icon">${icon}</div>
        <div>
          <div class="doc-tag ${tag}">${label}</div>
          <div class="doc-name">${name}</div>
          <div class="doc-meta">${meta}</div>
        </div>
      </div>`;

    const T = {
      pageLabel: isUz ? 'Yuridik va texnik'             : 'Юридические и технические',
      pageTitle: isUz ? 'Hujjatlar'                      : 'Документы',
      pageSub:   isUz ? 'Sertifikatlar, shartnomalar, texnik pasportlar va narxlar ro\'yxati' : 'Сертификаты, договоры, технические паспорта и прайс-листы',
      infoTxt:   isUz ? 'Hujjatlar tanishish maqsadida taqdim etilgan. Asl nusxalar va notarial tasdiqlangan nusxalar uchun menejerga murojaat qiling.' : 'Документы предоставлены в ознакомительных целях. Для получения оригиналов и нотариально заверенных копий обратитесь к менеджеру.',
      sec1:      isUz ? 'Sertifikatlar va litsenziyalar'  : 'Сертификаты и лицензии',
      sec2:      isUz ? 'Yuridik hujjatlar'               : 'Юридические документы',
      sec3:      isUz ? 'Narxlar ro\'yxati va kataloglar' : 'Прайс-листы и каталоги',
      // cert labels
      cert:      isUz ? 'Sertifikat'  : 'Сертификат',
      license:   isUz ? 'Litsenziya'  : 'Лицензия',
      auth:      isUz ? 'Vakolat'     : 'Авторизация',
      contract:  isUz ? 'Shartnoma'   : 'Договор',
      details:   isUz ? 'Rekvizitlar' : 'Реквизиты',
      // doc names
      d1:  isUz ? 'Grundfos distribyutorlik shartnomasi'                   : 'Дистрибьюторское соглашение Grundfos',
      d2:  isUz ? 'Atlas Copco distribyutorlik shartnomasi'                : 'Дистрибьюторское соглашение Atlas Copco',
      d3:  isUz ? 'ISO 9001:2015 — Sifat menejmenti tizimi'               : 'ISO 9001:2015 — Система менеджмента качества',
      d4:  isUz ? 'Davlat ro\'yxatidan o\'tganlik guvohnomasi'            : 'Свидетельство о государственной регистрации',
      d5:  isUz ? 'Siemens O\'zbekiston vakolatli dileri'                 : 'Авторизованный дилер Siemens Узбекистан',
      d6:  isUz ? 'ABB O\'zbekiston vakolatli dileri'                     : 'Авторизованный дилер ABB Узбекистан',
      d7:  isUz ? 'Standart yetkazib berish shartnomasi'                  : 'Типовой договор поставки',
      d8:  isUz ? 'Texnik xizmat ko\'rsatish shartnomasi'                 : 'Договор на техническое обслуживание',
      d9:  isUz ? 'PromSnab MChJ bank rekvizitlari'                       : 'Банковские реквизиты ООО PromSnab',
      d10: isUz ? 'Nasos uskunalari narxlar ro\'yxati — iyul 2026'        : 'Прайс-лист насосное оборудование — июль 2026',
      d11: isUz ? 'Kompressor uskunalari narxlar ro\'yxati'               : 'Прайс-лист компрессорное оборудование',
      d12: isUz ? 'Umumiy uskunalar katalogi 2026'                        : 'Общий каталог оборудования 2026',
      // bottom
      notFound:  isUz ? 'Kerakli hujjatni topmadingizmi?' : 'Не нашли нужный документ?',
      reqBtn:    isUz ? '📞 Hujjat so\'rash'              : '📞 Запросить документ',
      upd:       isUz ? 'Yangilangan'                      : 'Обновлён',
      valid:     isUz ? 'Amal qilish muddati'              : 'Действителен до',
    };

    document.getElementById('main-content').innerHTML = `
      <section class="section" style="padding-top:40px">
        <div class="container">
          <div class="section-header">
            <div class="section-label">${T.pageLabel}</div>
            <h1 class="section-title">${T.pageTitle}</h1>
            <p style="color:var(--text-2);margin-top:8px">${T.pageSub}</p>
          </div>

          <div style="background:var(--bg-2);border:1px solid var(--border-hi);border-radius:var(--r-lg);padding:18px 24px;display:flex;align-items:center;gap:16px;margin-bottom:32px">
            <div style="font-size:24px">ℹ️</div>
            <div style="font-size:13px;color:var(--text-2)">${T.infoTxt}</div>
          </div>

          <div class="doc-section-title">${T.sec1}</div>
          <div class="doc-grid">
            ${dc('cert','📜',T.cert,T.d1,`PDF · 1.2 ${isUz?'MB':'МБ'} · ${T.upd} 01.01.2026`)}
            ${dc('cert','📜',T.cert,T.d2,`PDF · 980 ${isUz?'KB':'КБ'} · ${T.upd} 01.03.2026`)}
            ${dc('cert','🏅',T.cert,T.d3,`PDF · 450 ${isUz?'KB':'КБ'} · ${T.valid} 2027`)}
            ${dc('cert','📋',T.license,T.d4,`PDF · 320 ${isUz?'KB':'КБ'}`)}
            ${dc('cert','✅',T.auth,T.d5,`PDF · 560 ${isUz?'KB':'КБ'} · 2026`)}
            ${dc('cert','✅',T.auth,T.d6,`PDF · 490 ${isUz?'KB':'КБ'} · 2026`)}
          </div>

          <div class="doc-section-title">${T.sec2}</div>
          <div class="doc-grid">
            ${dc('doc','📄',T.contract,T.d7,`DOCX · 45 ${isUz?'KB':'КБ'}`)}
            ${dc('doc','📄',T.contract,T.d8,`DOCX · 38 ${isUz?'KB':'КБ'}`)}
            ${dc('doc','📊',T.details,T.d9,`PDF · 120 ${isUz?'KB':'КБ'}`)}
          </div>

          <div class="doc-section-title">${T.sec3}</div>
          <div class="doc-grid">
            ${dc('pdf','💰','PDF',T.d10,`PDF · 1.8 ${isUz?'MB':'МБ'} · ${T.upd} 01.07.2026`)}
            ${dc('pdf','💰','PDF',T.d11,`PDF · 1.2 ${isUz?'MB':'МБ'} · ${T.upd} 15.06.2026`)}
            ${dc('pdf','📚','PDF',T.d12,`PDF · 8.4 ${isUz?'MB':'МБ'} · ${isUz?'Versiya':'Версия'} 3.2`)}
          </div>

          <div style="text-align:center;margin-top:40px">
            <p style="color:var(--text-2);margin-bottom:16px">${T.notFound}</p>
            <button class="btn btn-primary" onclick="openCallback()">${T.reqBtn}</button>
          </div>
        </div>
      </section>
    `;
  </script>
</body>
</html>

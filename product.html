<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товар — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'product.html', title: t('nav.catalog') });

    const isUz = currentLang === 'uz';

    const PL = {
      home:        t('nav.home'),
      catalog:     t('nav.catalog'),
      notFound:    isUz ? 'Mahsulot topilmadi'              : 'Товар не найден',
      toCatalog:   isUz ? 'Katalogga o\'tish'               : 'Перейти в каталог',
      art:         isUz ? 'Art:'                             : 'Арт:',
      inStock:     isUz ? '📦 Mavjud'                       : '📦 В наличии',
      original:    isUz ? '✅ Original'                     : '✅ Оригинал',
      qty:         isUz ? 'Miqdor'                          : 'Количество',
      pieces:      isUz ? 'dona.'                            : 'шт.',
      addCart:     isUz ? '🛒 Savatga'                      : '🛒 В корзину',
      quote:       isUz ? '📋 Tijorat taklifi so\'rash'     : '📋 Запросить коммерческое предложение',
      delivery:    isUz ? '🚚 Yetkazib berish 1–5 kun'      : '🚚 Доставка 1–5 дней',
      guarantee:   isUz ? '📜 Rasmiy kafolat'               : '📜 Официальная гарантия',
      tabSpecs:    isUz ? 'Xususiyatlar'                    : 'Характеристики',
      tabDocs:     isUz ? 'Hujjatlar'                       : 'Документы',
      tabReviews:  isUz ? 'Sharhlar'                        : 'Отзывы',
      specsEmpty:  isUz ? 'Xususiyatlar aniqlanmoqda'       : 'Характеристики уточняются',
      docTitle1:   isUz ? 'Texnik tavsif'                   : 'Техническое описание',
      docTitle2:   isUz ? 'Muvofiqlik sertifikati'          : 'Сертификат соответствия',
      downloading: isUz ? 'Yuklanish boshlandi...'           : 'Скачивание началось...',
      savings:     isUz ? 'Tejash:'                         : 'Экономия:',
      relatedLabel:isUz ? 'Shuningdek ko\'riladi'           : 'Также смотрят',
      relatedTitle:isUz ? 'O\'xshash mahsulotlar'           : 'Похожие товары',
      reviews:     t('reviews'),
      currency:    t('currency'),
      addedToast:  isUz ? 'savatga qo\'shildi' : 'добавлен в корзину',
    };

    const SPECS = {
      pumps: isUz ? [
        ['Turi','Ko\'p bosqichli markazdan qochma'],['Unumdorlik','5 m³/soat'],['Bosim','40 m'],
        ['Dvigatel quvvati','1.1 kVt'],['Kuchlanish','220/380 V'],
        ['Korpus materiali','Zanglamaydigan po\'lat AISI 304'],['Himoya darajasi','IP44'],['Og\'irlik','8.5 kg']
      ] : [
        ['Тип','Центробежный многоступенчатый'],['Подача','5 м³/ч'],['Напор','40 м'],
        ['Мощность двигателя','1.1 кВт'],['Напряжение','220/380 В'],
        ['Материал корпуса','Нержавеющая сталь AISI 304'],['Степень защиты','IP44'],['Вес','8.5 кг']
      ],
      compressors: isUz ? [
        ['Turi','Vintli'],['Unumdorlik','1800 l/min'],['Ish bosimi','8 bar'],
        ['Quvvat','15 kVt'],['Kuchlanish','380 V / 50 Hz'],['Resiver hajmi','90 l'],
        ['Shovqin darajasi','68 dB'],['Og\'irlik','310 kg']
      ] : [
        ['Тип','Винтовой'],['Производительность','1800 л/мин'],['Рабочее давление','8 бар'],
        ['Мощность','15 кВт'],['Напряжение','380 В / 50 Гц'],['Объём ресивера','90 л'],
        ['Уровень шума','68 дБ'],['Вес','310 кг']
      ],
      valves: isUz ? [
        ['Turi','Klinli zaglushka'],['DN','200 mm'],['PN','16 bar'],
        ['Korpus materiali','Cho\'yan GG25'],['Zichlash','EPDM'],
        ['Ulash','Flanetsli'],['Standart','GOST 5762'],['Og\'irlik','42 kg']
      ] : [
        ['Тип','Клиновая задвижка'],['DN','200 мм'],['PN','16 бар'],
        ['Материал корпуса','Чугун GG25'],['Уплотнение','EPDM'],
        ['Присоединение','Фланцевое'],['Стандарт','ГОСТ 5762'],['Вес','42 кг']
      ],
      electric: isUz ? [
        ['Turi','Asinxron'],['Quvvat','7.5 kVt'],['Aylanish tezligi','1500 ayl/min'],
        ['Kuchlanish','380 V'],['FIK','IE3 – 91%'],['Himoya darajasi','IP55'],
        ['Izolyatsiya sinfi','F'],['Og\'irlik','55 kg']
      ] : [
        ['Тип','Асинхронный'],['Мощность','7.5 кВт'],['Частота вращения','1500 об/мин'],
        ['Напряжение','380 В'],['КПД','IE3 – 91%'],['Степень защиты','IP55'],
        ['Класс изоляции','F'],['Вес','55 кг']
      ],
      fire: isUz ? [
        ['Turi','Rozetka sprinkler'],['Harorat','68°C'],['K-faktor','80'],
        ['Rezba','G3/4"'],['Qoplama','Xromlash'],['Bosim','0.5–12 bar'],
        ['Standart','EN 12259-1'],['Kolba rangi','Qizil']
      ] : [
        ['Тип','Розеточный спринклер'],['Температура','68°C'],['K-фактор','80'],
        ['Резьба','G3/4"'],['Покрытие','Хромирование'],['Давление','0.5–12 бар'],
        ['Стандарт','EN 12259-1'],['Цвет колбы','Красный']
      ],
      pipes: isUz ? [
        ['Turi','Tikuvchisiz issiq deformatsiyalanган'],['Diametr','108 mm'],
        ['Devor qalinligi','4 mm'],['Po\'lat','20'],['GOST','8732-78'],
        ['Uzunlik','6/9/12 m'],['Qoplama','Qoplamasi yo\'q'],['1 m og\'irligi','10.26 kg']
      ] : [
        ['Тип','Бесшовная горячедеформированная'],['Диаметр','108 мм'],
        ['Толщина стенки','4 мм'],['Сталь','20'],['ГОСТ','8732-78'],
        ['Длина','6/9/12 м'],['Покрытие','Без покрытия'],['Вес 1 м','10.26 кг']
      ],
      lubricants: isUz ? [
        ['Turi','Plastik moy'],['Quyuqlashtiruvchi','Li-kompleks'],['NLGI','2'],
        ['Ish diapazoni','-25°C...+120°C'],['Asos','Mineral moy'],
        ['Rangi','Och jigarrang'],['Hajmi','18 kg'],['Standart','DIN 51825 KP2K-25']
      ] : [
        ['Тип','Пластичная смазка'],['Загуститель','Li-комплекс'],['NLGI','2'],
        ['Рабочий диапазон','-25°C...+120°C'],['Основа','Минеральное масло'],
        ['Цвет','Светло-коричневый'],['Объём','18 кг'],['Стандарт','DIN 51825 KP2K-25']
      ],
      machines: isUz ? [
        ['Turi','Tokarlik-vintoreza'],['RMTs','1000 mm'],['Markazlar balandligi','215 mm'],
        ['Quvvat','11 kVt'],['Aylanish tezligi','12.5–1600 ayl/min'],
        ['Massa','3050 kg'],['Kuchlanish','380 V'],['Aniqlik sinfi','N']
      ] : [
        ['Тип','Токарно-винторезный'],['РМЦ','1000 мм'],['Высота центров','215 мм'],
        ['Мощность','11 кВт'],['Частота вращения','12.5–1600 об/мин'],
        ['Масса','3050 кг'],['Напряжение','380 В'],['Класс точности','Н']
      ],
    };

    const REVIEWS = isUz ? [
      { author:'Aleksandr M.', date:'12 may 2026', stars:'★★★★★', text:'Ajoyib uskunalar, e\'lon qilingan xususiyatlarga mos keladi. Yetkazib berish tez keldi, qadoqlash ishonchli. Tavsiya qilaman!' },
      { author:'"TechStroy" MChJ', date:'3 aprel 2026', stars:'★★★★☆', text:'PromSnab bilan 3 yildan beri ishlaymiz. Mahsulot sifati barqaror, menejerlar doim aloqada. Yagona — hajm uchun chegirma bo\'lsa yaxshi edi.' },
      { author:'Behruz K.', date:'18 mart 2026', stars:'★★★★★', text:'Sanoat ob\'ekti uchun oldim. 6 oydan beri muammosiz ishlayapti. Servis a\'lo darajada.' },
    ] : [
      { author:'Александр М.', date:'12 мая 2026', stars:'★★★★★', text:'Отличное оборудование, соответствует заявленным характеристикам. Доставка пришла быстро, упаковка надёжная. Рекомендую!' },
      { author:'ООО «ТехСтрой»', date:'3 апреля 2026', stars:'★★★★☆', text:'Работаем с PromSnab уже 3 года. Качество продукции стабильное, менеджеры всегда на связи. Единственное — хотелось бы скидку за объём.' },
      { author:'Бехруз К.', date:'18 марта 2026', stars:'★★★★★', text:'Брал для промышленного объекта. Работает без нареканий уже 6 месяцев. Сервис на высоте.' },
    ];

    const id = parseInt(new URLSearchParams(location.search).get('id'));
    const p = PRODUCTS.find(x => x.id === id);

    if (!p) {
      document.getElementById('main-content').innerHTML = `
        <div class="container" style="padding:80px 0">
          <div class="empty-state">
            <div class="empty-state-icon">😕</div>
            <h3>${PL.notFound}</h3>
            <button class="btn btn-primary mt-4" onclick="nav('catalog.html')">${PL.toCatalog}</button>
          </div>
        </div>`;
    } else {
      document.title = p.name + ' — PromSnab';

      const specRows = (SPECS[p.category] || []).map(([k,v]) =>
        `<div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`
      ).join('');

      document.getElementById('main-content').innerHTML = `
        <div class="container" style="padding-top:24px;padding-bottom:64px">
          <div class="breadcrumb">
            <a onclick="nav('index.html')">${PL.home}</a>
            <span class="breadcrumb-sep">›</span>
            <a onclick="nav('catalog.html')">${PL.catalog}</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${catNameById(p.category)}</span>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current">${p.name}</span>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;margin-top:32px">
            <div>
              <div class="product-detail-img">${p.emoji}</div>
              <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
                ${badgeHtml(p.badge)}
                <span class="badge-tag badge-new">${PL.inStock}</span>
                <span class="badge-tag" style="background:rgba(34,197,94,.1);color:var(--success)">${PL.original}</span>
              </div>
            </div>

            <div>
              <div style="font-size:12px;color:var(--primary);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${catNameById(p.category)} · ${p.brand}</div>
              <h1 style="font-size:28px;font-weight:800;line-height:1.2;margin-bottom:8px">${p.name}</h1>
              <div style="font-size:12px;color:var(--text-3);font-family:monospace;margin-bottom:12px">${PL.art} ${p.sku}</div>

              <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
                <span class="stars" style="font-size:16px">${stars(p.rating)}</span>
                <span style="font-size:14px;color:var(--text-2)">${p.rating} · ${p.reviews} ${PL.reviews}</span>
              </div>

              <p style="font-size:14px;color:var(--text-2);line-height:1.7;margin-bottom:24px">${p.desc}</p>

              <div style="background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r-sm);padding:20px;margin-bottom:20px">
                <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:8px">
                  <span style="font-size:36px;font-weight:900">${fmt(p.price)}</span>
                  <span style="font-size:16px;color:var(--text-2)">${PL.currency}</span>
                  ${p.old ? `<span style="font-size:14px;color:var(--text-3);text-decoration:line-through">${fmt(p.old)} ${PL.currency}</span>` : ''}
                </div>
                ${p.old ? `<div style="font-size:12px;color:var(--success)">${PL.savings} ${fmt(p.old-p.price)} ${PL.currency} (${Math.round((1-p.price/p.old)*100)}%)</div>` : ''}
              </div>

              <div style="display:flex;gap:12px;margin-bottom:16px">
                <div style="flex:1">
                  <label class="form-label">${PL.qty}</label>
                  <div style="display:flex;align-items:center;gap:8px">
                    <button class="qty-btn" onclick="qtyChange(-1)">−</button>
                    <input id="qty-input" type="number" class="form-control" value="1" min="1" style="width:60px;text-align:center">
                    <button class="qty-btn" onclick="qtyChange(1)">+</button>
                    <span style="font-size:13px;color:var(--text-2)">${PL.pieces}</span>
                  </div>
                </div>
              </div>

              <div style="display:flex;gap:10px;margin-bottom:12px">
                <button class="btn btn-primary btn-lg" style="flex:1" onclick="addToCartQty()">${PL.addCart}</button>
                <button class="icon-btn fav-btn${isFav(p.id)?' active':''}" data-id="${p.id}" onclick="toggleFav(${p.id},this)" style="width:50px;height:50px" title="${t('favs.title')}">♡</button>
              </div>
              <button class="btn btn-outline w-full" onclick="nav('contacts.html')">${PL.quote}</button>

              <div style="display:flex;gap:16px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
                <span style="font-size:13px;color:var(--text-2)">${PL.delivery}</span>
                <span style="font-size:13px;color:var(--text-2)">${PL.guarantee}</span>
              </div>
            </div>
          </div>

          <!-- TABS -->
          <div style="margin-top:48px">
            <div class="tabs">
              <div class="tab active" onclick="switchTab('specs',this)">${PL.tabSpecs}</div>
              <div class="tab" onclick="switchTab('docs',this)">${PL.tabDocs}</div>
              <div class="tab" onclick="switchTab('reviews',this)">${PL.tabReviews} (${p.reviews})</div>
            </div>
            <div id="tab-specs">
              ${specRows || `<p style="color:var(--text-2)">${PL.specsEmpty}</p>`}
            </div>
            <div id="tab-docs" class="hidden">
              <div style="display:flex;flex-direction:column;gap:10px">
                <div class="card card-body flex gap-3" style="cursor:pointer" onclick="toast('info','${PL.downloading}')">
                  <span style="font-size:24px">📄</span>
                  <div><div style="font-weight:600;font-size:14px">${PL.docTitle1} ${p.name}</div><div style="font-size:12px;color:var(--text-2)">PDF, 2.4 ${isUz?'MB':'МБ'}</div></div>
                </div>
                <div class="card card-body flex gap-3" style="cursor:pointer" onclick="toast('info','${PL.downloading}')">
                  <span style="font-size:24px">📋</span>
                  <div><div style="font-weight:600;font-size:14px">${PL.docTitle2}</div><div style="font-size:12px;color:var(--text-2)">PDF, 0.8 ${isUz?'MB':'МБ'}</div></div>
                </div>
              </div>
            </div>
            <div id="tab-reviews" class="hidden">
              <div style="display:flex;flex-direction:column;gap:12px">
                ${REVIEWS.map(r => `<div class="review-card">
                  <div style="display:flex;justify-content:space-between">
                    <div><div class="review-author">${r.author}</div><div class="review-date">${r.date}</div></div>
                    <span class="stars">${r.stars}</span>
                  </div>
                  <p class="review-text">${r.text}</p>
                </div>`).join('')}
              </div>
            </div>
          </div>

          <!-- RELATED -->
          <div style="margin-top:64px">
            <div class="section-header">
              <div class="section-label">${PL.relatedLabel}</div>
              <h2 class="section-title">${PL.relatedTitle}</h2>
            </div>
            <div class="grid-4" id="related-grid"></div>
          </div>
        </div>
      `;

      const related = PRODUCTS.filter(x => x.id !== p.id && x.category === p.category).slice(0,4);
      document.getElementById('related-grid').innerHTML = related.map(r => renderProductCard(r)).join('');
    }

    function switchTab(name, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      ['specs','docs','reviews'].forEach(t => document.getElementById('tab-'+t)?.classList.toggle('hidden', t !== name));
    }

    function qtyChange(d) {
      const inp = document.getElementById('qty-input');
      inp.value = Math.max(1, parseInt(inp.value||1) + d);
    }

    function addToCartQty() {
      if (!p) return;
      const qty = parseInt(document.getElementById('qty-input')?.value||1);
      const existing = state.cart.find(x=>x.id===p.id);
      if (existing) { existing.qty = qty; saveCart(); }
      else state.cart.push({id: p.id, qty});
      saveCart(); renderCartBadge(); renderCart();
      toast('success', `${p.name} × ${qty} ${PL.addedToast}`);
    }
  </script>
</body>
</html>

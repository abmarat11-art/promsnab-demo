<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Акции — PromSnab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main id="main-content"></main>

  <script src="js/main.js"></script>
  <script src="js/header.js"></script>
  <script>
    injectShell({ page: 'promo.html', title: t('nav.promo') });

    const isUz = currentLang === 'uz';
    const P = {
      label:      isUz ? 'Maxsus takliflar'                       : 'Специальные предложения',
      title:      isUz ? 'Aksiyalar va chegirmalar'               : 'Акции и скидки',
      hotLabel:   isUz ? 'Issiq taklif'                          : 'Горячее предложение',
      hotTitle:   isUz ? 'Nasos uskunalariga<br>25% gacha chegirma' : 'Скидки до 25%<br>на насосное оборудование',
      hotSub:     isUz ? 'Grundfos, Pedrollo, Wilo — omborda cheklangan miqdor' : 'Grundfos, Pedrollo, Wilo — ограниченное количество на складе',
      hotBtn:     isUz ? 'Mahsulotlarni ko\'rish →'              : 'Смотреть товары →',
      hotUntil:   isUz ? '31 iyulgacha'                           : 'До 31 июля',
      newLabel:   isUz ? 'Yangiliklar'                             : 'Новинки',
      newTitle:   isUz ? 'ABB chastota konvertorlari'             : 'Частотные преобразователи ABB',
      newSub:     isUz ? 'Ombor kengaytirildi — ishlab chiqaruvchi narxlari' : 'Расширение склада — цены производителя',
      newBtn:     isUz ? 'Batafsil →'                             : 'Подробнее →',
      saleLabel:  isUz ? 'Chegirmada'                             : 'Со скидкой',
      saleTitle:  isUz ? 'Aksiya mahsulotlari'                   : 'Товары по акции',
      saleBadge:  isUz ? '−15% va undan ko\'p'                   : '−15% и более',
      couponTitle:isUz ? 'Birinchi buyurtmaga promo-kod'          : 'Промокод на первый заказ',
      couponSub:  isUz ? '100 000 so\'mdan birinchi buyurtmaga 5% chegirma. Rasmiylashtishda kodni kiriting.' : 'Получите скидку 5% на первый заказ от 100 000 сум. Введите код при оформлении.',
      couponValid:isUz ? 'Oy oxirigacha amal qiladi'             : 'Действует до конца месяца',
    };

    document.getElementById('main-content').innerHTML = `
      <section class="section" style="padding-top:40px">
        <div class="container">
          <div class="section-header">
            <div class="section-label">${P.label}</div>
            <h1 class="section-title">${P.title}</h1>
          </div>

          <div style="display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:40px">
            <div style="background:linear-gradient(135deg,#0D1117 0%,#1C2333 100%);border:1px solid var(--border-hi);border-radius:var(--r-lg);padding:36px 40px;position:relative;overflow:hidden">
              <div style="position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(6,182,212,.15),transparent 70%);pointer-events:none"></div>
              <div style="font-size:11px;font-weight:800;color:var(--primary);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px">${P.hotLabel}</div>
              <h2 style="font-size:28px;font-weight:900;margin-bottom:10px">${P.hotTitle}</h2>
              <p style="color:var(--text-2);margin-bottom:24px;font-size:14px">${P.hotSub}</p>
              <div style="display:flex;align-items:center;gap:16px">
                <button class="btn btn-primary btn-lg" onclick="nav('catalog.html?cat=pumps')">${P.hotBtn}</button>
                <div style="font-size:13px;color:var(--text-3)">${P.hotUntil}</div>
              </div>
            </div>
            <div style="background:linear-gradient(135deg,#1C1008,#2D1F0A);border:1px solid rgba(249,115,22,.25);border-radius:var(--r-lg);padding:28px;display:flex;flex-direction:column;justify-content:space-between">
              <div>
                <div style="font-size:11px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">${P.newLabel}</div>
                <h3 style="font-size:20px;font-weight:800;margin-bottom:8px">${P.newTitle}</h3>
                <p style="font-size:13px;color:var(--text-2)">${P.newSub}</p>
              </div>
              <button class="btn btn-outline" style="border-color:var(--accent);color:var(--accent)" onclick="nav('catalog.html?brand=ABB')">${P.newBtn}</button>
            </div>
          </div>

          <div class="flex-between section-header">
            <div>
              <div class="section-label">${P.saleLabel}</div>
              <h2 class="section-title">${P.saleTitle}</h2>
            </div>
            <div style="display:flex;gap:8px">
              <button class="badge-tag badge-sale" style="font-size:13px;padding:6px 14px;cursor:default">${P.saleBadge}</button>
            </div>
          </div>
          <div class="grid-4" id="promo-grid"></div>

          <div style="margin-top:52px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:32px 36px;display:flex;align-items:center;gap:32px">
            <div style="font-size:40px">🎁</div>
            <div style="flex:1">
              <div style="font-size:18px;font-weight:800;margin-bottom:6px">${P.couponTitle}</div>
              <div style="font-size:14px;color:var(--text-2)">${P.couponSub}</div>
            </div>
            <div style="text-align:center;flex-shrink:0">
              <div style="font-size:22px;font-weight:900;letter-spacing:.1em;color:var(--primary);background:var(--bg-3);border:2px dashed var(--border-hi);border-radius:var(--r);padding:10px 22px;margin-bottom:8px">FIRST5</div>
              <div style="font-size:12px;color:var(--text-3)">${P.couponValid}</div>
            </div>
          </div>
        </div>
      </section>
    `;

    const saleProducts = PRODUCTS.filter(p => p.badge === 'sale' || p.old);
    document.getElementById('promo-grid').innerHTML = saleProducts.map(p => renderProductCard(p)).join('');
  </script>
</body>
</html>
